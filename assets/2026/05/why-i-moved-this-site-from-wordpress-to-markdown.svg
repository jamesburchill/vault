<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">A traditional publishing stack flattening into Markdown files</title>
  <desc id="desc">An editorial illustration contrasting a layered CMS stack with clear Markdown files flowing through Git into a simple static page.</desc>
